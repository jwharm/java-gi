name: Run Gradle build

on:
  push:
    branches:
      - main

jobs:
  run-gradle-build:
    runs-on: docker
    container:
      image: node:trixie
    steps:
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Checkout java-gi repository
        uses: actions/checkout@v6
        with:
          repository: 'java-gi/java-gi'
          submodules: 'true'

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y meson pkg-config libglib2.0-dev libgirepository1.0-dev libcairo2-dev libgtk-4-dev xvfb

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Gradle build
        run: |
          Xvfb :100 -ac &
          export DISPLAY=:100.0
          ./gradlew build --info
